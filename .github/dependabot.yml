# .github/dependabot.yml
#
# Dependabot configuration for this repository.
#
# This repo currently contains:
# - Rust backend under /backend with Cargo.toml and Cargo.lock
# - GitHub Actions workflows under /.github/workflows
#
# Removed:
# - npm, because there is no frontend/package.json
# - pip, because there is no requirements.txt / pyproject.toml
# - terraform, because there are no .tf files
#
# Security grouping:
# - groups + applies-to: security-updates creates fewer grouped security PRs.
# - cooldown delays normal version updates, not security updates.

version: 2

updates:
  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    cooldown:
      default-days: 14
    groups:
      github-actions-security:
        applies-to: security-updates
        patterns: ["*"]
      github-actions-minor-patch:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["minor", "patch"]
      github-actions-major:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["major"]
    labels:
      - "dependencies"
    commit-message:
      prefix: "dependabot(actions)"
      include: "scope"
    open-pull-requests-limit: 2

  # Rust backend dependencies
  - package-ecosystem: "cargo"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Berlin"
    cooldown:
      default-days: 7
    groups:
      cargo-security:
        applies-to: security-updates
        patterns: ["*"]
      cargo-minor-patch:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["minor", "patch"]
        group-by: dependency-name
      cargo-major:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["major"]
        group-by: dependency-name
    labels:
      - "dependencies"
    commit-message:
      prefix: "dependabot(cargo)"
      include: "scope"
    open-pull-requests-limit: 3
